<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Quiz Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-blue: #4a4af5;
            --dim-blue: #3a3a9e;
            --bright-blue: #8a8aff;
            --bg-color: #12121f;
            --font-color: #c0c0fa;
            --panel-bg: #1a1a2e;
            --surface-bg: #202035;
            --border-color: #3a3a5e;
        }

        html, body {
            overscroll-behavior-y: none;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e0fc;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
            padding: 30px 20px;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        button, input {
            touch-action: manipulation;
        }

        .page-view {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .page-view.hidden {
            display: none;
        }

        .generator-container,
        .quiz-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(74, 74, 245, 0.4), 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .generator-container {
            width: 90%;
            max-width: 900px;
            padding: 30px 40px;
            text-align: center;
        }

        h1, h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--bright-blue);
            text-shadow: 0 0 8px rgba(138, 138, 255, 0.5);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        p, label {
            color: var(--font-color);
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: left;
        }

        .explanation-container {
            background-color: var(--surface-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .info-section strong,
        .explanation-container strong {
            color: var(--bright-blue);
        }

        .input-label {
            display: block;
            margin-bottom: 10px;
            text-align: left;
        }

        .inline-helper-link {
            color: #aab3ff;
            text-decoration: none;
            font-size: 0.92em;
            font-weight: 400;
            margin-left: 6px;
        }

        .inline-helper-link:hover {
            color: #d2d7ff;
            text-decoration: underline;
        }

        .url-input,
        textarea {
            width: 100%;
            background-color: #2a2a4e;
            color: #d0d0fc;
            border: 1px solid #4a4a7e;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.95em;
            box-sizing: border-box;
        }

        .url-input {
            margin-bottom: 20px;
        }

        .status-line {
            min-height: 24px;
            margin-bottom: 18px;
            color: #b9b9ff;
            font-size: 0.95em;
            text-align: left;
        }

        .status-line.error {
            color: #ff939c;
        }

        .status-line.success {
            color: #8ff0aa;
        }

        .status-timer {
            display: inline-block;
            margin-left: 10px;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.92em;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
        }

        .button-group,
        .review-controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .button-group {
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .prompt-toggle-wrap {
            text-align: left;
        }

        .prompt-toggle-button {
            padding: 8px 0;
            background: none;
            border: none;
            color: var(--bright-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .prompt-toggle-button:hover:not(:disabled) {
            color: #d6dbff;
        }

        .prompt-editor-wrap {
            margin-top: 10px;
        }

        .prompt-editor-wrap.hidden {
            display: none;
        }

        #promptOverrideInput {
            min-height: 180px;
            resize: vertical;
        }

        .prompt-helper-text {
            margin-top: 8px;
            margin-bottom: 0;
            font-size: 0.88em;
            color: #9fa5e8;
        }

        .action-button,
        .secondary-button,
        .nav-button,
        .filter-btn,
        .copy-review-btn,
        .menu-btn,
        .file-upload-label {
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease;
            font-family: 'Orbitron', sans-serif;
        }

        .action-button,
        .nav-button,
        .copy-review-btn {
            background: linear-gradient(45deg, var(--base-blue), var(--bright-blue));
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(74, 74, 245, 0.3);
        }

        .action-button,
        .secondary-button {
            padding: 10px 25px;
            font-size: 1em;
            min-width: 100px;
        }

        .secondary-button,
        .filter-btn,
        .menu-btn,
        .file-upload-label {
            background: none;
            border: 1px solid var(--base-blue);
            color: var(--bright-blue);
            box-shadow: none;
        }

        .action-button:hover:not(:disabled),
        .secondary-button:hover:not(:disabled),
        .nav-button:hover:not(:disabled),
        .filter-btn:hover:not(:disabled),
        .copy-review-btn:hover:not(:disabled),
        .menu-btn:hover,
        .file-upload-label:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(74, 74, 245, 0.5);
        }

        .secondary-button:hover:not(:disabled),
        .filter-btn.active,
        .menu-btn:hover,
        .file-upload-label:hover {
            background: linear-gradient(45deg, var(--base-blue), var(--bright-blue));
            color: white;
        }

        .action-button:disabled,
        .secondary-button:disabled {
            background: #5a5a7e;
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: none;
            transform: none;
        }

        .loading-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-left: 5px;
            border-radius: 50%;
            background: var(--bright-blue);
            animation: pulse 1.1s infinite ease-in-out;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.15s; }
        .loading-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 100% { transform: scale(0.7); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
        }

        .modal-overlay,
        .panel-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(18, 18, 31, 0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .panel-overlay {
            z-index: 20000;
            cursor: pointer;
        }

        .modal-content,
        .panel-content {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            cursor: default;
        }

        .modal-close-btn,
        .close-button-x {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: var(--font-color);
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        #sessions-list,
        #past-sessions-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #sessions-list li,
        #past-sessions-list li {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--font-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #sessions-list li:hover,
        #past-sessions-list li:hover {
            background-color: var(--surface-bg);
        }

        #sessions-list li:last-child,
        #past-sessions-list li:last-child {
            border-bottom: none;
        }

        .empty-state-panel {
            display: none;
            margin-top: 12px;
            padding: 18px;
            border: 1px dashed #4a4a7e;
            border-radius: 12px;
            text-align: center;
            background: rgba(32, 32, 53, 0.65);
        }

        .empty-state-panel p {
            margin: 0 0 14px;
            text-align: center;
            color: #c7c9ff;
        }

        .empty-state-panel input[type="file"] {
            display: none;
        }

        #quizTopControls {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10000;
            display: flex;
            gap: 10px;
        }

        #reset-quiz-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 18px;
            background: none;
            border: 1px solid var(--dim-blue);
            color: var(--dim-blue);
            border-radius: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10000;
        }

        #reset-quiz-btn:hover,
        #profile-btn:hover {
            background-color: var(--dim-blue);
            color: var(--bg-color);
        }

        #profile-btn {
            padding: 10px 18px;
            background: none;
            border: 1px solid var(--dim-blue);
            color: var(--dim-blue);
            border-radius: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quiz-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 500px;
            margin-top: 70px;
            position: relative;
        }

        .quiz-content {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        #question-counter {
            font-size: 0.9em;
            color: #aaaafc;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid transparent;
            transition: all 0.2s;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 4px;
        }

        #question-counter:hover {
            color: #fff;
            border-color: var(--dim-blue);
            background-color: #2a2a4e;
        }

        .navigator-overlay {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background-color: var(--surface-bg);
            border: 1px solid var(--base-blue);
            border-radius: 10px;
            padding: 20px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: none;
        }

        .navigator-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .nav-item {
            padding: 10px 0;
            text-align: center;
            background-color: #2a2a4e;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            font-size: 0.9em;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .nav-item.current {
            border-color: var(--bright-blue);
            box-shadow: 0 0 5px var(--bright-blue);
        }

        .nav-item.correct { background-color: #1f7a3f; border-color: #28a745; }
        .nav-item.incorrect { background-color: #9a2532; border-color: #dc3545; }

        .nav-favorite-star {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.6em;
            color: #ffd25a;
            line-height: 1;
            pointer-events: none;
        }

        .navigator-close {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: none;
            border: 1px solid #4a4a7e;
            color: #aaaafc;
            cursor: pointer;
        }

        .navigator-source-link {
            display: none;
            margin-top: 10px;
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--base-blue);
            border-radius: 8px;
            color: var(--bright-blue);
            text-decoration: none;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .navigator-source-link:hover {
            background: linear-gradient(45deg, var(--base-blue), var(--bright-blue));
            color: #ffffff;
            box-shadow: 0 6px 15px rgba(74, 74, 245, 0.5);
            transform: scale(1.02);
        }

        #question-text {
            font-size: 1.3em;
            color: #f0f0ff;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 60px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        #reveal-choices-btn {
            display: none;
            margin: 0 auto 20px;
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid var(--base-blue);
            background: none;
            color: var(--bright-blue);
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
        }

        .option-button {
            background-color: #2a2a4e;
            color: #d0d0fc;
            border: 1px solid #4a4a7e;
            padding: 12px 15px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
            text-align: left;
            width: 100%;
        }

        .option-button:hover:not(:disabled) {
            background-color: #3a3a6e;
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(74, 74, 245, 0.3);
        }

        .option-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-button.correct {
            background-color: #1f7a3f !important;
            border-color: #28a745 !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.6) !important;
            opacity: 1 !important;
        }

        .option-button.incorrect {
            background-color: #9a2532 !important;
            border-color: #dc3545 !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.6) !important;
            opacity: 1 !important;
        }

        .option-button.reveal-correct {
            background-color: #1c6a39 !important;
            border-color: #258a3c !important;
            color: #ffffff !important;
            box-shadow: 0 0 10px rgba(30, 120, 60, 0.5) !important;
            opacity: 0.9 !important;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            width: 100%;
        }

        .nav-button {
            padding: 12px 30px;
            font-size: 1.1em;
            min-width: 120px;
        }

        .nav-button:disabled {
            background: #5a5a7e;
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: none;
            transform: none;
        }

        .favorite-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--bright-blue);
            background: rgba(74, 74, 245, 0.1);
            color: #f5d742;
            font-size: 1.3rem;
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        .favorite-toggle.active {
            background: rgba(245, 215, 66, 0.2);
            box-shadow: 0 0 12px rgba(245, 215, 66, 0.7);
        }

        .favorite-mark { color: #f5d742; margin-left: 6px; }

        #completion-message {
            margin-top: 0;
            flex-grow: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .review-controls {
            margin-bottom: 20px;
            width: 100%;
        }

        .copy-review-btn {
            padding: 8px 16px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .review-list {
            width: 100%;
            text-align: left;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .review-card {
            background-color: var(--surface-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .review-card.correct-card { border-left: 4px solid #28a745; }
        .review-card.incorrect-card { border-left: 4px solid #dc3545; }
        .review-q { font-weight: bold; margin-bottom: 8px; color: #e0e0fc; }
        .review-ans { margin-bottom: 5px; }
        .ans-label { font-size: 0.8em; opacity: 0.7; }
        .user-ans-text.correct { color: #28a745; }
        .user-ans-text.incorrect { color: #dc3545; }
        .review-exp { margin-top: 10px; font-style: italic; color: #aaaafc; font-size: 0.9em; border-top: 1px solid var(--border-color); padding-top: 5px; }

        .profile-menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn,
        .file-upload-label {
            display: block;
            width: 100%;
            text-align: center;
            padding: 12px 20px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .profile-menu-container input[type="file"] {
            display: none;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            padding: 14px 0;
            border-top: 1px solid #303050;
            color: var(--font-color);
        }

        .settings-row:first-of-type {
            border-top: none;
        }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .generator-container,
            .quiz-container {
                width: 95%;
                padding: 20px;
            }
            h1 { font-size: 1.5em; }
            #quizTopControls { top: 10px; right: 10px; }
            #profile-btn { padding: 8px 12px; font-size: 0.8em; }
            #question-text { font-size: 1.1em; min-height: 40px; }
            .nav-button { padding: 10px 20px; font-size: 1em; min-width: 100px; }
            .review-controls { flex-direction: column; align-items: stretch; }
            .copy-review-btn { margin-left: 0; margin-top: 10px; }
        }
    </style>
    <script defer src="/static/youtube-quiz.js"></script>
</head>
<body>
    <section id="home-view" class="page-view">
        <div class="generator-container">
            <h1>YouTube Quiz Generator</h1>

            <label class="input-label" for="youtubeUrlInput">
                YouTube URL
                <a class="inline-helper-link" href="https://starfox1230.github.io/The-Library/apps/quiz-generator/index.html" target="_blank" rel="noopener noreferrer">(Other Media?)</a>
            </label>
            <input id="youtubeUrlInput" class="url-input" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">

            <div id="generationStatus" class="status-line"></div>

            <div class="button-group">
                <button id="viewPastSessionsBtn" class="secondary-button" type="button">View Past Sessions</button>
                <button id="generateBtn" class="action-button" type="button">Generate and View Quiz</button>
            </div>

            <div class="prompt-toggle-wrap">
                <button id="togglePromptBtn" class="prompt-toggle-button" type="button" aria-expanded="false" aria-controls="promptEditorWrap">View Prompt</button>
                <div id="promptEditorWrap" class="prompt-editor-wrap hidden">
                    <label class="input-label" for="promptOverrideInput">Quiz generation prompt</label>
                    <textarea id="promptOverrideInput" spellcheck="false"></textarea>
                    <p class="prompt-helper-text">Edits here are used for the next quiz generation request.</p>
                </div>
            </div>
        </div>
    </section>

    <section id="quiz-view" class="page-view hidden">
        <div id="quizTopControls">
            <button id="profile-btn" type="button">Profile</button>
        </div>
        <button id="reset-quiz-btn" type="button" aria-label="Reset quiz progress">Reset</button>

        <div class="quiz-container">
            <button id="favorite-toggle" class="favorite-toggle" type="button" aria-pressed="false" title="Save question to favorites">☆</button>

            <div id="navigator-overlay" class="navigator-overlay">
                <div id="navigator-grid" class="navigator-grid"></div>
                <a id="navigator-source-link" class="navigator-source-link" href="#" target="_blank" rel="noopener noreferrer">Open Source Video</a>
                <button id="view-progress-review-btn" class="navigator-close" type="button">View Answers So Far</button>
                <button id="navigator-close" class="navigator-close" type="button">Close Menu</button>
            </div>

            <div class="quiz-content">
                <h1 id="quiz-title">Generated Quiz</h1>
                <div id="question-counter" title="Tap to jump to question"></div>
                <div id="question-text">Loading question...</div>
                <button id="reveal-choices-btn" type="button">Reveal Answer Choices</button>
                <div id="answer-options" class="options-container"></div>
                <div id="explanation" class="explanation-container" style="display: none;"></div>
            </div>

            <div id="completion-message">
                <h2 id="final-score">Quiz Complete!</h2>
                <div class="review-controls">
                    <button id="back-to-quiz-btn" class="filter-btn" type="button" style="display: none;">Back to Quiz</button>
                    <button class="filter-btn active" data-filter="all" type="button">All</button>
                    <button class="filter-btn" data-filter="correct" type="button">Correct</button>
                    <button class="filter-btn" data-filter="incorrect" type="button">Incorrect</button>
                    <button class="filter-btn" data-filter="favorites" type="button">Favorites</button>
                    <button id="copy-review-btn" class="copy-review-btn" type="button">Copy Listed Items</button>
                </div>
                <div id="review-list" class="review-list"></div>
            </div>

            <div class="navigation-buttons">
                <button id="prev-button" class="nav-button" type="button">Previous</button>
                <button id="next-button" class="nav-button" type="button">Next</button>
            </div>
        </div>
    </section>

    <div id="main-sessions-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" type="button">&times;</button>
            <h2>Select a Past Quiz to View</h2>
            <ul id="sessions-list"></ul>
            <div id="sessions-empty-state" class="empty-state-panel">
                <p>No past quizzes found yet.</p>
                <label for="upload-home-sessions" class="file-upload-label">Load Past Quizzes JSON</label>
                <input id="upload-home-sessions" type="file" accept=".json">
            </div>
        </div>
    </div>

    <div id="profile-panel" class="panel-overlay">
        <div class="panel-content">
            <button class="close-button-x" data-target="profile-panel" type="button">&times;</button>
            <h2>Profile and Sessions</h2>
            <div class="profile-menu-container">
                <button id="open-settings-btn" class="menu-btn" type="button">Settings</button>
                <button id="go-home-btn" class="menu-btn" type="button">Home</button>
                <button id="view-past-sessions-btn" class="menu-btn" type="button">View Past Quizzes</button>
                <button id="download-current-session-btn" class="menu-btn" type="button">Download this Quiz JSON</button>
                <button id="download-all-sessions-btn" class="menu-btn" type="button">Download All Quizzes JSON</button>
                <label for="upload-single-session" class="file-upload-label">Upload New Quiz JSON</label>
                <input id="upload-single-session" type="file" accept=".json">
                <label for="upload-multiple-sessions" class="file-upload-label">Merge Past Quizzes JSON</label>
                <input id="upload-multiple-sessions" type="file" accept=".json">
            </div>
        </div>
    </div>

    <div id="settings-panel" class="panel-overlay">
        <div class="panel-content">
            <button class="close-button-x" data-target="settings-panel" type="button">&times;</button>
            <h2>Settings</h2>
            <div class="settings-row">
                <label for="reveal-choices-toggle">Hide answer choices until revealed</label>
                <input id="reveal-choices-toggle" type="checkbox">
            </div>
        </div>
    </div>

    <div id="past-sessions-panel" class="panel-overlay">
        <div class="panel-content">
            <button class="close-button-x" data-target="past-sessions-panel" type="button">&times;</button>
            <h2>Select a Past Quiz</h2>
            <ul id="past-sessions-list"></ul>
        </div>
    </div>
</body>
</html>
